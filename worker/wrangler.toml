# Root directory desse Worker no Cloudflare Pages/Workers Build precisa
# ser "worker" (não a raiz do repo) — senão ele builda o monorepo inteiro
# como se fosse assets estáticos do frontend, em vez de rodar este script.
name = "sunset-tabas-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# GOOGLE_ROUTES_API_KEY é opcional — sem ela, cai pro OSRM (grátis, sem
# chave) automaticamente, igual o backend Rust já fazia. Defina com:
#   npx wrangler secret put GOOGLE_ROUTES_API_KEY
# (nunca em texto puro aqui no wrangler.toml).
